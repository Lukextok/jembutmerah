name: Run Telegram Bot 24/7

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Bot Script Directly
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        python py.py
        
